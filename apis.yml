name: Sally Beauty Holdings
description: >-
  Sally Beauty Holdings, Inc. is a leading international specialty retailer and
  distributor of professional beauty supplies. Operates through two segments: Sally
  Beauty Supply (consumer-facing beauty retail) and Beauty Systems Group (BSG,
  professional-only distribution). The company serves salon professionals, colorists,
  and beauty enthusiasts with over 4,800 stores globally.
